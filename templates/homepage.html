<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/homeStyle.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
    integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
</head>

<body>
  <div class="container container1">
    <div class="container container2">
      <div class="row" style="text-align: center;">
        <div class="col col-sm-5">
          <img class="pull-right" src="../static/styles/image.png" alt="" width="200" height="150">
        </div>
        <div class="col col-sm-7">
          <h1 class="pull-left"
            style="padding: 20px 0;font-weight:600;font-family:Georgia, 'Times New Roman', Times, serif">
            Text Cloak
          </h1>
        </div>
      </div>

      <br>

      <div class="row">
        <!-- HIDE COLUMN -->
        <div class="col-sm-6">
          <div class="form-class">
            <form action="/hide" method="POST">
              <p><b>HIDE</b></p>
              <hr>

              <label for="sec_msg"><b>Secret</b></label><br>
              <input type="text" placeholder="Enter a secret message"
                     name="sec_msg" id="sec_msg" required
                     oninput="updateCapacity()">
              <br>

              <label for="cvr_msg"><b>Cover Message</b></label><br>
              <input type="text" placeholder="Enter your message"
                     name="cvr_msg" id="cvr_msg" required
                     oninput="updateCapacity()">
              <br>

              <small id="capacity_indicator" style="color: green;">
                Message capacity: type a cover message to see how much it can hide.
              </small>
              <br><br>

              <button type="submit" class="hidebtn" id="hide_button">
                Hide <i class="fa fa-long-arrow-right" aria-hidden="true"></i>
              </button>

              {% if result %}
              <h5><b>Below steg message has been copied to your clipboard!</b></h5>
              <input type="text" value='{{result}}' name="emd_msg" id="emd_msg" required>
              <button type="button" class="hidebtn" onclick="downloadStegMessage()">
                <i class="fa fa-download" aria-hidden="true"></i> Save to a File
              </button>
              {% endif %}
            </form>
          </div>
        </div>

        <!-- REVEAL COLUMN -->
        <div class="col-sm-6">
          <div class="form-class">
            <form action="/reveal" method="POST">
              <p><b>REVEAL</b></p>
              <hr>

              <label for="steg_msg"><b>Stegcloaked Message</b></label><br>
              <input type="text" placeholder="Enter your stegcloaked message"
                     name="steg_msg" id="steg_msg" required>
              <br>

              <label for="steg_file"><b>Or Load from a File</b></label><br>
              <input type="file" id="steg_file" accept=".txt" onchange="loadStegFile(this)">
              <br>

              <button type="submit" class="revealbtn">
                Get Secret <i class="fa fa-long-arrow-right" aria-hidden="true"></i>
              </button>

              {% if result_reveal %}
              <h5><b>Here is your secret message!</b></h5>
              <input type="text" value='{{result_reveal}}' name="ext_msg" id="ext_msg" required>
              {% endif %}
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  function updateCapacity() {
    const cover = document.getElementById("cvr_msg").value || "";
    const secret = document.getElementById("sec_msg").value || "";
    const indicator = document.getElementById("capacity_indicator");
    const hideButton = document.getElementById("hide_button");

    const coverLength = cover.length;
    const secretLength = secret.length;

    // The embedding scheme requires:
    // - 4 zero-width characters of overhead
    // - 6 zero-width characters per hidden character
    // Therefore, capacity = floor((coverLength - 4) / 6)
    const headerOverhead = 4;
    let maxHiddenCharacters = 0;

    if (coverLength > headerOverhead) {
      maxHiddenCharacters = Math.floor((coverLength - headerOverhead) / 6);
    }

    // Case: both fields empty
    if (secretLength === 0 && coverLength === 0) {
      indicator.innerText =
        "Message capacity: type a cover message to see how much it can hide.";
      indicator.style.color = "green";

      hideButton.disabled = true;
      hideButton.style.backgroundColor = "gray";
      hideButton.style.cursor = "not-allowed";
      return;
    }

    // Case: secret typed but no cover
    if (secretLength > 0 && coverLength === 0) {
      indicator.innerText = "Message capacity: enter a cover message.";
      indicator.style.color = "red";

      hideButton.disabled = true;
      hideButton.style.backgroundColor = "gray";
      hideButton.style.cursor = "not-allowed";
      return;
    }

    // Case: cover exists but too short to hide anything
    if (maxHiddenCharacters <= 0) {
      indicator.innerText =
        "Message capacity: this cover message is too short to hide any secret text.";
      indicator.style.color = "red";

      hideButton.disabled = true;
      hideButton.style.backgroundColor = "gray";
      hideButton.style.cursor = "not-allowed";
      return;
    }

    // Case: secret is too long to fit within capacity
    if (secretLength > maxHiddenCharacters) {
      indicator.innerText =
        "Message capacity: can hide up to " + maxHiddenCharacters + " characters. " +
        "Your secret is " + secretLength + " characters (too long).";
      indicator.style.color = "red";

      hideButton.disabled = true;
      hideButton.style.backgroundColor = "gray";
      hideButton.style.cursor = "not-allowed";
      return;
    }

    // Case: all conditions are valid, secret fits
    indicator.innerText =
      "Message capacity: can hide up to " + maxHiddenCharacters + " characters. " +
      "Your secret is " + secretLength + " characters (fits).";
    indicator.style.color = "green";

    hideButton.disabled = false;
    hideButton.style.backgroundColor = "rgb(78, 95, 190)";
    hideButton.style.cursor = "pointer";
  }

  // Save steg message to a text file
  function downloadStegMessage() {
    const text = document.getElementById('emd_msg').value;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'stego_message.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Load steg message from file into reveal input
  function loadStegFile(input) {
    const file = input.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        const content = e.target.result;
        document.getElementById('steg_msg').value = content.trim();
      };
      reader.readAsText(file, 'UTF-8');
    }
  }
</script>

<script>
  window.onload = updateCapacity;
</script>
</body>

</html>
